<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3d8bfd" />
  <title>Operaciones — Scorecard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preload" href="audio/Music-Background.mp3" as="audio" type="audio/mpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal-shared.css" />
  <link rel="stylesheet" href="scorecard-status.css" />
  <link rel="stylesheet" href="scorecard-audio.css?v=20260330f" />
  <script src="scorecard-ui-sounds.js" defer></script>
  <script src="portal-shared.js" defer></script>
  <script src="scorecard-status.js" defer></script>
  <script src="scorecard-live.js" defer></script>
  <script src="scorecard-audio.js?v=20260330f" defer></script>
  <style>
    .portal-shell-wide { max-width: 1480px; }
    .op-kpi-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .op-kpi {
      flex: 1;
      min-width: 120px;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    .op-kpi .v {
      font-family: "Outfit", sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--accent);
    }
    .op-kpi .l {
      font-size: 0.65rem;
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
  </style>
</head>
<body class="portal-body">
  <div class="portal-shell portal-shell-wide">
    <div id="scorecard-status-mount"></div>
    <header class="portal-topbar">
      <a class="portal-logo" href="index.html">
        <div class="portal-logo-mark">SC</div>
        <div class="portal-logo-text">
          <span>Portal</span>
          <strong>Reporte operaciones</strong>
        </div>
      </a>
      <div class="portal-top-meta">
        <span class="portal-pill">Turno: <strong>Matutino</strong></span>
        <button type="button" class="portal-icon-btn" id="portal-btn-theme" title="Tema" aria-pressed="false">☼</button>
      </div>
    </header>

    <a class="portal-back" href="portal.html?view=home">← Portada</a>

    <div class="portal-page-head">
      <h1>Producción y entregas</h1>
      <p>Los filtros <strong>Día</strong> y <strong>Línea</strong> recargan la tabla y los KPI de ejemplo.</p>
    </div>

    <div class="portal-filters">
      <div>
        <label for="op-dia">Día</label>
        <select id="op-dia" aria-label="Rango de día">
          <option value="hoy">Hoy</option>
          <option value="ayer">Ayer</option>
          <option value="7d">Últimos 7 días</option>
        </select>
      </div>
      <div>
        <label for="op-linea">Línea</label>
        <select id="op-linea" aria-label="Línea de producción">
          <option value="todas">Todas</option>
          <option value="l1">L1</option>
          <option value="l2">L2</option>
          <option value="l3">L3</option>
        </select>
      </div>
    </div>

    <div class="op-kpi-row" id="op-kpi-row" aria-live="polite"></div>

    <div class="portal-table-wrap">
      <table class="portal-table" id="op-table">
        <thead>
          <tr>
            <th>SKU</th>
            <th>Plan t</th>
            <th>Real t</th>
            <th>Var %</th>
            <th>Scrap kg</th>
            <th>Scrap %</th>
            <th>Paros min</th>
            <th>OTIF</th>
            <th>Comentario</th>
          </tr>
        </thead>
        <tbody id="op-tbody"></tbody>
      </table>
    </div>

    <footer class="portal-footer">Operaciones — datos demo según filtros (listo para API o Power BI).</footer>
  </div>
  <script>
    (function () {
      // Modo embebido: unifica tema con la página padre (executive.html).
      var embedded = false;
      try { embedded = window.top && window.top !== window; } catch (_) {}
      if (!embedded) return;

      document.documentElement.style.background = 'transparent';
      document.body.style.background = 'transparent';

      var topbar = document.querySelector('.portal-topbar');
      var back = document.querySelector('.portal-back');
      var themeBtn = document.getElementById('portal-btn-theme');
      if (topbar) topbar.style.display = 'none';
      if (back) back.style.display = 'none';
      if (themeBtn) themeBtn.style.display = 'none';
      var mount = document.getElementById('scorecard-status-mount');
      if (mount) mount.style.display = 'none';

      function applyTheme(mode) {
        document.body.classList.toggle('light', mode === 'light');
      }
      window.addEventListener('message', function (ev) {
        var d = ev && ev.data;
        if (!d || typeof d !== 'object') return;
        if (d.type === 'scorecard:theme') applyTheme(d.mode);
      });
      applyTheme('dark');
    })();
  </script>
  <script>
    (function () {
      var DATA = {
        'hoy-todas': {
          kpis: [
            { l: 'Ton. plan', v: '513' },
            { l: 'Ton. real', v: '498' },
            { l: 'OTIF', v: '96%' },
            { l: 'Paros min', v: '185' }
          ],
          rows: [
            ['SKU-1001', '120', '118', '-1.7%', '210', '0.9%', '45', 'Sí', 'OK'],
            ['SKU-1002', '95', '102', '+7.4%', '180', '0.7%', '22', 'Sí', 'Sobreproducción'],
            ['SKU-1003', '200', '176', '-12%', '520', '1.4%', '120', 'Parcial', 'Falta material'],
            ['SKU-1004', '80', '81', '+1.2%', '95', '0.6%', '18', 'Sí', '—']
          ]
        },
        'ayer-todas': {
          kpis: [
            { l: 'Ton. plan', v: '505' },
            { l: 'Ton. real', v: '512' },
            { l: 'OTIF', v: '94%' },
            { l: 'Paros min', v: '142' }
          ],
          rows: [
            ['SKU-1001', '118', '120', '+1.7%', '198', '0.8%', '30', 'Sí', 'Recuperación'],
            ['SKU-1002', '96', '94', '-2.1%', '205', '0.9%', '55', 'Sí', 'Cambio formato'],
            ['SKU-1005', '140', '138', '-1.4%', '310', '1.1%', '40', 'Sí', 'OK']
          ]
        },
        '7d-todas': {
          kpis: [
            { l: 'Ton. acum.', v: '3,420' },
            { l: 'vs plan', v: '98.2%' },
            { l: 'OTIF', v: '95%' },
            { l: 'Scrap prom.', v: '0.95%' }
          ],
          rows: [
            ['SKU-1001', '840', '822', '-2.1%', '1.4k', '0.9%', '280', 'Sí', 'Semana estable'],
            ['SKU-1002', '665', '671', '+0.9%', '1.1k', '0.8%', '190', 'Sí', '—'],
            ['SKU-1003', '1.2k', '1.09k', '-9.2%', '2.8k', '1.3%', '410', 'Parcial', 'Dos días cortos']
          ]
        },
        'hoy-l2': {
          kpis: [
            { l: 'L2 · plan', v: '210' },
            { l: 'L2 · real', v: '198' },
            { l: 'OEE lineal', v: '81%' },
            { l: 'Paros', v: '92 min' }
          ],
          rows: [
            ['SKU-2001', '110', '102', '-7.3%', '120', '0.85%', '62', 'Sí', 'Arranque lento'],
            ['SKU-2002', '100', '96', '-4%', '88', '0.7%', '30', 'Sí', 'OK']
          ]
        },
        'hoy-l1': {
          kpis: [
            { l: 'L1 · plan', v: '180' },
            { l: 'L1 · real', v: '185' },
            { l: 'OTIF', v: '100%' },
            { l: 'Scrap', v: '0.72%' }
          ],
          rows: [
            ['SKU-1100', '90', '92', '+2.2%', '44', '0.6%', '12', 'Sí', '—'],
            ['SKU-1101', '90', '93', '+3.3%', '51', '0.8%', '10', 'Sí', '—']
          ]
        },
        'hoy-l3': {
          kpis: [
            { l: 'L3 · plan', v: '123' },
            { l: 'L3 · real', v: '115' },
            { l: 'OTIF', v: '92%' },
            { l: 'Paros', v: '48 min' }
          ],
          rows: [
            ['SKU-3001', '123', '115', '-6.5%', '200', '1.2%', '48', 'Parcial', 'Falta operador']
          ]
        }
      };

      function resolve(dia, linea) {
        if (linea !== 'todas' && dia === 'hoy') {
          var hk = 'hoy-' + linea;
          if (DATA[hk]) return hk;
        }
        var tk = dia + '-todas';
        if (DATA[tk]) return tk;
        return 'hoy-todas';
      }

      function otifCell(val) {
        var cls = val === 'Sí' ? 'portal-badge-ok' : 'portal-badge-warn';
        return '<td class="' + cls + '">' + val + '</td>';
      }

      function render() {
        var dia = document.getElementById('op-dia').value;
        var linea = document.getElementById('op-linea').value;
        var k = resolve(dia, linea);
        var pack = DATA[k];
        var kpiEl = document.getElementById('op-kpi-row');
        kpiEl.innerHTML = pack.kpis.map(function (x) {
          return '<div class="op-kpi"><div class="v">' + x.v + '</div><div class="l">' + x.l + '</div></div>';
        }).join('');
        document.getElementById('op-tbody').innerHTML = pack.rows.map(function (r) {
          var cells = r.map(function (c, i) {
            if (i === 7) return otifCell(c);
            return '<td>' + c + '</td>';
          }).join('');
          return '<tr>' + cells + '</tr>';
        }).join('');
      }

      document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('op-dia').addEventListener('change', render);
        document.getElementById('op-linea').addEventListener('change', render);
        render();
      });
    })();
  </script>
</body>
</html>
